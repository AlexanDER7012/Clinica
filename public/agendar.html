<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica - Agendar Cita</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto py-10">
        <h1 class="text-4xl font-black text-center mb-5">Agendar <span class="text-indigo-600">Cita</span></h1>
        <p id="sede-label" class="text-center font-bold uppercase text-indigo-500 mb-10"></p>

        <div class="md:flex gap-10">
            <div class="md:w-1/2 bg-white shadow-lg rounded-lg p-8">
                <form id="formulario-cita">
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block font-bold uppercase text-xs">DPI</label>
                            <input id="dpi" type="text" class="border w-full p-2 rounded">
                        </div>
                        <div>
                            <label class="block font-bold uppercase text-xs">Sexo</label>
                            <select id="sexo" class="border w-full p-2 rounded">
                                <option value="">-- Seleccione --</option>
                                <option value="MASCULINO">Masculino</option>
                                <option value="FEMENINO">Femenino</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block font-bold uppercase text-xs">Nombres</label>
                            <input id="nombres" type="text" class="border w-full p-2 rounded">
                        </div>
                        <div>
                            <label class="block font-bold uppercase text-xs">Apellidos</label>
                            <input id="apellidos" type="text" class="border w-full p-2 rounded">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="block font-bold uppercase text-xs">Fecha Nacimiento</label>
                        <input id="fecha_nacimiento" type="date" class="border w-full p-2 rounded">
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block font-bold uppercase text-xs">Teléfono</label>
                            <input id="telefono" type="tel" class="border w-full p-2 rounded">
                        </div>
                        <div>
                            <label class="block font-bold uppercase text-xs">Email</label>
                            <input id="email" type="email" class="border w-full p-2 rounded">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="block font-bold uppercase text-xs">Dirección</label>
                        <input id="direccion" type="text" class="border w-full p-2 rounded">
                    </div>

                    <div class="mb-4">
                        <label class="block font-bold uppercase text-xs">Contacto Emergencia (Opcional)</label>
                        <input id="contacto_emergencia" type="text" class="border w-full p-2 rounded">
                    </div>

                    <hr class="my-6">

                    <div class="mb-4">
                        <label class="block font-bold uppercase text-xs">Especialidad</label>
                        <select id="especialidad" class="border w-full p-2 rounded"></select>
                    </div>

                    <div class="mb-4">
                        <label class="block font-bold uppercase text-xs">Doctor</label>
                        <select id="doctor" class="border w-full p-2 rounded" disabled>
                            <option value="">-- Seleccione Doctor --</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="block font-bold uppercase text-xs">Fecha Cita</label>
                        <input id="fecha" type="datetime-local" class="border w-full p-2 rounded">
                    </div>

                    <div class="mb-4">
                        <label class="block font-bold uppercase text-xs">Motivo</label>
                        <textarea id="motivo" class="border w-full p-2 rounded"></textarea>
                    </div>

                    <input type="submit" value="Registrar Cita" class="bg-indigo-600 hover:bg-indigo-700 w-full p-3 text-white uppercase font-bold cursor-pointer rounded">
                </form>
            </div>

            <div class="md:w-1/2">
                <h2 class="text-2xl font-black text-center mb-5">Citas Agendadas</h2>
                <div id="contenedor-citas"></div>
            </div>
        </div>
    </div>
    <script src="js/agendar.js"></script>
</body>
</html>
